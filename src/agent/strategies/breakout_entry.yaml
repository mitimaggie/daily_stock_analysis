id: breakout_entry
name: 突破买点策略
description: 识别关键压力位突破，寻找高确定性做多入场点

system_prompt_addon: |
  ## 当前策略模式：突破买点
  你正在用【突破买点策略】分析该股票，重点关注：
  1. **关键压力位**：前高/平台顶部/年线/均线密集区是否突破
  2. **放量确认**：突破必须有量能配合（量比 > 1.5），缩量突破易假突破
  3. **突破后回踩**：放量突破后缩量回踩确认支撑，是加仓黄金点
  4. **乖离率控制**：追突破不能乖离太大，MA5乖离率 < 8% 为宜
  5. **止损设置**：突破失败（跌回压力位以下）立即止损

  评估逻辑：
  - 有效突破（量价齐升，站稳压力位以上1-2日）→ 可追入
  - 突破回踩确认支撑 → 最佳加仓时机
  - 假突破（缩量或次日回落）→ 观望

focus_tools:
  - get_realtime_quote
  - get_daily_history

key_metrics:
  - volume_ratio
  - bias_ma5
  - resistance_level
  - buy_signal
