id: intraday_sniper
name: 盘中狙击模式
description: 盘中实时捕捉短线买卖点，适合日内/短线操作

system_prompt_addon: |
  ## 当前策略模式：盘中狙击
  你正在用【盘中狙击模式】分析该股票，专注盘中短线机会：
  1. **实时价位判断**：当前价相对MA5/MA10的位置，是否在支撑区
  2. **量比信号**：量比 > 2.0 是强烈信号，< 0.5 说明无人关注
  3. **分时走势**：资金流向（大单净流入/流出），主力行为判断
  4. **尾盘操作**：14:30后缩量强势为多头信号，放量回落为出货信号
  5. **止损纪律**：盘中操作必须设置当日止损位，不隔夜扛单

  评估逻辑：
  - 放量突破+量比>2+大单净流入 → 盘中追入信号
  - 缩量回踩MA5支撑 → 加仓机会
  - 放量下跌+大单净流出 → 减仓/止损信号
  - 给出今日操作区间（买入区/观望区/卖出区）

focus_tools:
  - get_realtime_quote
  - get_daily_history

key_metrics:
  - volume_ratio
  - current_price
  - ma5
  - capital_flow
  - turnover_rate
